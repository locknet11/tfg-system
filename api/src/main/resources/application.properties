mongodb.connection.uri=${MONGODB_URI:mongodb://localhost:27017}
mongodb.database.name=${MONGODB_DATABASE_NAME:tfg-system}
spring.data.mongodb.auto-index-creation=${MONGODB_AUTO_INDEX_CREATION:true}
jwt.secret=${JWT_SECRET:TUNnOHdPR1JwM2twSjlDQlRNOHVFMVlnQVBDSzFER1VabE9hTDFzQ1lGaHFSSzlwdXFld3BUZzNnZlg4bXFBeQ==}
spring.mvc.log-resolved-exception=${LOG_RESOLVED_EXCEPTION:false}
# comma separated values for allowedOrigins
allowedOrigins=${ALLOWED_ORIGINS:http://localhost:4200}
applicationDomain=${APPLICATION_DOMAIN:http://localhost:4200}

# API base URL for agent scripts
api.base-url=${API_BASE_URL:http://localhost:8080}

# FreeMarker templates for install scripts and email alerts
spring.freemarker.template-loader-path=classpath:/scripts/,classpath:/templates/

# Resend email configuration
resend.api-key=${RESEND_API_KEY:}
resend.from-address=${RESEND_FROM_ADDRESS:}

# NVD (NIST) API configuration for vulnerability lookup
nvd.api.key=${NVD_API_KEY:}
nvd.api.base-url=${NVD_API_BASE_URL:https://services.nvd.nist.gov/rest/json}
nvd.api.rate-limit.requests-per-window=${NVD_RATE_LIMIT_REQUESTS:5}
nvd.api.rate-limit.window-seconds=${NVD_RATE_LIMIT_WINDOW:30}
vulnerability.cache.staleness-days=${VULN_CACHE_STALENESS_DAYS:30}

# Heartbeat monitoring configuration
heartbeat.timeout.seconds=${HEARTBEAT_TIMEOUT_SECONDS:120}
heartbeat.scheduler.delay-ms=${HEARTBEAT_SCHEDULER_DELAY_MS:30000}

# Scheduled report generation (disabled by default; enable per environment)
reports.scheduler.enabled=${REPORTS_SCHEDULER_ENABLED:false}
reports.scheduler.cron=${REPORTS_SCHEDULER_CRON:0 0 2 * * *}

agent.binary.resource-path=${AGENT_BINARY_RESOURCE_PATH:agents}


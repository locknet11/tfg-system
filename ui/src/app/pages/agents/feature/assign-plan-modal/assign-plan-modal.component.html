<p-dialog
  header="Assign Plan to Agent"
  i18n-header
  [(visible)]="showModal"
  [modal]="true"
  [draggable]="false"
  [dismissableMask]="true"
  [style]="{ width: '32rem' }"
  [breakpoints]="{ '640px': '95vw' }"
  (onHide)="closeModal()">
  <div class="p-fluid">
    <div class="mb-4">
      <div *ngIf="loadingPlan" class="flex align-items-center gap-2 text-500">
        <i class="pi pi-spin pi-spinner"></i>
        <span i18n>Loading current plan…</span>
      </div>

      <div
        *ngIf="!loadingPlan && planLoadError"
        class="flex align-items-center gap-2 text-red-500">
        <i class="pi pi-exclamation-triangle"></i>
        <span i18n>Could not load the current plan.</span>
      </div>

      <ng-container *ngIf="!loadingPlan && !planLoadError">
        <div
          *ngIf="currentPlan; else noCurrentPlan"
          class="surface-100 border-round p-3">
          <div class="font-medium mb-2" i18n>Currently Assigned Plan</div>
          <div *ngIf="currentPlan.notes" class="text-600 mb-2">
            {{ currentPlan.notes }}
          </div>
          <ol *ngIf="currentPlan.steps.length > 0" class="m-0 pl-4 text-600">
            <li *ngFor="let step of currentPlan.steps">
              {{ formatActionLabel(step.action) }}
            </li>
          </ol>
          <div *ngIf="currentPlan.steps.length === 0" class="text-500" i18n>
            This plan has no steps.
          </div>
        </div>
        <ng-template #noCurrentPlan>
          <div class="surface-100 border-round p-3 text-500" i18n>
            No plan is currently assigned to this agent.
          </div>
        </ng-template>
      </ng-container>
    </div>

    <div
      class="flex align-items-center gap-3 mt-2 pb-3 mb-4 border-bottom-1 surface-border">
      <p-inputSwitch
        inputId="useTemplate"
        [(ngModel)]="useTemplate"
        (onChange)="toggleMode()"></p-inputSwitch>
      <label for="useTemplate" class="font-medium cursor-pointer" i18n
        >Use Existing Template</label
      >
    </div>

    <div *ngIf="useTemplate" class="field">
      <label for="template" class="font-medium block mb-2" i18n
        >Select Template</label
      >
      <p-dropdown
        id="template"
        [(ngModel)]="selectedTemplateId"
        [options]="templates"
        placeholder="Select Template"
        i18n-placeholder
        [showClear]="true"
        [filter]="true"
        appendTo="body"></p-dropdown>
    </div>

    <form *ngIf="!useTemplate" [formGroup]="planForm">
      <div class="field mb-4">
        <label for="notes" class="font-medium block mb-2" i18n>Notes</label>
        <textarea
          id="notes"
          pInputTextarea
          formControlName="notes"
          rows="3"></textarea>
      </div>

      <div class="field mb-4">
        <p-checkbox
          inputId="allowTemplating"
          formControlName="allowTemplating"
          [binary]="true"
          label="Allow Templating"
          i18n-label></p-checkbox>
      </div>

      <div class="field mb-0">
        <div class="flex align-items-center justify-content-between mb-2">
          <label class="font-medium" i18n>Steps</label>
          <p-button
            label="Add Step"
            i18n-label
            icon="pi pi-plus"
            size="small"
            [outlined]="true"
            (onClick)="addStep()"></p-button>
        </div>
        <div formArrayName="steps">
          <div
            *ngFor="let step of stepsFormArray.controls; let i = index"
            [formGroupName]="i"
            class="flex align-items-center gap-2 mb-2">
            <span
              class="step-number flex align-items-center justify-content-center border-circle surface-100 text-600 font-medium flex-shrink-0"
              >{{ i + 1 }}</span
            >
            <p-dropdown
              formControlName="action"
              [options]="stepActionOptions"
              placeholder="Select Action"
              i18n-placeholder
              appendTo="body"
              class="flex-grow-1"></p-dropdown>
            <p-button
              icon="pi pi-trash"
              severity="danger"
              [text]="true"
              [rounded]="true"
              (onClick)="removeStep(i)"
              pTooltip="Remove Step"
              i18n-pTooltip
              tooltipPosition="top"></p-button>
          </div>
          <div
            *ngIf="stepsFormArray.length === 0"
            class="flex flex-column align-items-center gap-2 p-4 text-center border-1 border-dashed surface-border border-round">
            <i class="pi pi-list text-2xl text-500"></i>
            <span class="text-500" i18n
              >No steps yet. Add at least one step to build a plan.</span
            >
          </div>
        </div>
      </div>
    </form>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      i18n-label
      severity="secondary"
      [text]="true"
      (onClick)="closeModal()"></p-button>
    <p-button
      label="Assign"
      i18n-label
      icon="pi pi-check"
      (onClick)="submitForm()"
      [loading]="submitting"
      [disabled]="!canSubmit"></p-button>
  </ng-template>
</p-dialog>

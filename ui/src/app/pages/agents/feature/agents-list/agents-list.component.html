<div class="agents-list-container">
  <div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold m-0" i18n>Agents</h1>
    <span class="p-input-icon-left">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Search agents..."
        i18n-placeholder
        (input)="onSearchInput($any($event.target)?.value)" />
    </span>
  </div>

  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <p-table
    [value]="agents()"
    [tableStyle]="{ 'min-width': '50rem' }"
    styleClass="agents-table"
    [lazy]="true"
    [lazyLoadOnInit]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [rows]="size()"
    [totalRecords]="total()"
    [paginator]="true"
    [alwaysShowPaginator]="true"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="loading()"
    i18n-currentPageReportTemplate
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [showCurrentPageReport]="true"
    dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th i18n>NAME</th>
        <th i18n>ASSIGNED TO</th>
        <th i18n>STATUS</th>
        <th i18n>VERSION</th>
        <th i18n>LAST CONNECTION</th>
        <th style="width: 8rem"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-agent>
      <tr>
        <td>
          {{ agent.name }}
          <i
            *ngIf="agent.replicatedFrom"
            class="pi pi-copy ml-1"
            style="color: var(--primary-color)"
            pTooltip="Replicated from parent agent"
            i18n-pTooltip></i>
        </td>
        <td>{{ agent.targetSystem || '—' }}</td>
        <td>
          <p-tag
            [value]="statusLabel(agent.status)"
            [severity]="statusSeverity(agent.status)"></p-tag>
        </td>
        <td>{{ agent.version || '—' }}</td>
        <td>{{ agent.lastConnection | date: 'short' }}</td>
        <td>
          <div class="flex gap-2 justify-content-end">
            <p-button
              icon="pi pi-file"
              (onClick)="openAssignPlanModal(agent.id)"
              [rounded]="true"
              [text]="true"
              severity="info"
              pTooltip="Assign Plan"
              i18n-pTooltip
              tooltipPosition="top"></p-button>
            <p-button
              icon="pi pi-trash"
              (onClick)="delete(agent)"
              [rounded]="true"
              [text]="true"
              severity="danger"
              pTooltip="Delete"
              i18n-pTooltip
              tooltipPosition="top"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4">
          {{ query() ? emptySearchMessage : emptyMessage }}
        </td>
      </tr>
    </ng-template>
  </p-table>

  <app-assign-plan-modal
    [agentId]="selectedAgentId"
    [showModal]="showAssignPlanModal"
    (modalClosed)="showAssignPlanModal = false"
    (planAssigned)="onPlanAssigned()"></app-assign-plan-modal>
</div>

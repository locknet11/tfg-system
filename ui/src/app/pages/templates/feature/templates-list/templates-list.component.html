<div class="templates-list-container">
  <div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold m-0" i18n>Templates</h1>
    <div class="flex gap-3 align-items-center">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          placeholder="Search templates..."
          i18n-placeholder
          (input)="onSearchInput($any($event.target)?.value)" />
      </span>
      <p-button
        label="Create Template"
        i18n-label
        icon="pi pi-plus"
        styleClass="p-button-success"
        (onClick)="createTemplate()"></p-button>
    </div>
  </div>

  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <p-table
    [value]="filteredTemplates()"
    [tableStyle]="{ 'min-width': '50rem' }"
    styleClass="templates-table"
    [lazy]="true"
    [lazyLoadOnInit]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [rows]="sizeSig()"
    [totalRecords]="totalSig()"
    [paginator]="true"
    [alwaysShowPaginator]="true"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="loadingSig()"
    i18n-currentPageReportTemplate
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [showCurrentPageReport]="true">
    <ng-template pTemplate="header">
      <tr>
        <th i18n>Name</th>
        <th i18n>Description</th>
        <th i18n>Steps</th>
        <th i18n>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-template>
      <tr>
        <td>{{ template.name }}</td>
        <td>{{ template.description || '—' }}</td>
        <td>{{ template.plan.steps.length }}</td>
        <td>
          <div class="flex gap-2 justify-content-end">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              (onClick)="editTemplate(template)"
              pTooltip="Edit"
              i18n-pTooltip
              tooltipPosition="top"></p-button>
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="deleteTemplate(template)"
              pTooltip="Delete"
              i18n-pTooltip
              tooltipPosition="top"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center p-4">
          {{
            querySig()
              ? emptySearchMessage
              : emptyMessage
          }}
        </td>
      </tr>
    </ng-template>
  </p-table>

  <app-create-template-modal
    (templateCreated)="loadTemplates()"></app-create-template-modal>
  <app-edit-template-modal
    (templateEdited)="loadTemplates()"></app-edit-template-modal>
</div>
